name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Recovery, falls ein Lauf nach dem Release-PR-Merge abbricht.
  workflow_dispatch:
    inputs:
      version:
        description: Bereits veröffentlichtes X.Y.Z für erneuten Image-Build/Deploy (leer = neuester Release)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      # Der erste Aufruf erstellt oder aktualisiert den Release-PR. Bei einem
      # Recovery-Lauf kann er stattdessen bereits Tag und Release erzeugen.
      - uses: googleapis/release-please-action@v4
        id: release-pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release-PR sofort mergen
        if: steps.release-pr.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release-pr.outputs.pr }}
        run: |
          pr_number=$(jq -er '.number' <<< "$RELEASE_PR")
          result=$(gh api --method PUT \
            "repos/$GITHUB_REPOSITORY/pulls/$pr_number/merge" \
            -f merge_method=squash)
          jq -e '.merged == true' <<< "$result" >/dev/null

      # Nach dem synchronen Merge erzeugt der zweite Aufruf Tag und Release.
      - uses: googleapis/release-please-action@v4
        id: release
        if: steps.release-pr.outputs.prs_created == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Nach einem Abbruch zwischen Merge und Release setzt schon der erste
      # Aufruf die Release-Outputs. Beide Aufrufe werden daher konsolidiert.
      - name: Release-Ausgaben konsolidieren
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CREATED: ${{ steps.release.outputs.release_created == 'true' || steps.release-pr.outputs.release_created == 'true' }}
          VERSION: ${{ steps.release.outputs.version || steps.release-pr.outputs.version }}
          TAG: ${{ steps.release.outputs.tag_name || steps.release-pr.outputs.tag_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ "$CREATED" != "true" ] && [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$REQUESTED_VERSION" ]; then
              VERSION=${REQUESTED_VERSION#v}
              TAG="v$VERSION"
              gh release view "$TAG" >/dev/null
            else
              TAG=$(gh release view --json tagName --jq '.tagName')
              VERSION=${TAG#v}
            fi
            CREATED=true
            echo "::notice::Recovery veröffentlicht $TAG erneut nach GHCR und Komodo."
          fi

          if [ "$CREATED" = "true" ] && ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Ungültige Release-Version: $VERSION"
            exit 1
          fi

          {
            echo "created=$CREATED"
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.rel.outputs.created == 'true'
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - uses: docker/setup-buildx-action@v3
        if: steps.rel.outputs.created == 'true'

      - uses: docker/login-action@v3
        if: steps.rel.outputs.created == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.rel.outputs.created == 'true'
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ steps.rel.outputs.version }}
          tags: |
            ghcr.io/oliverbenduhn/tabletto:${{ steps.rel.outputs.version }}
            ghcr.io/oliverbenduhn/tabletto:latest

      - name: Komodo-Deploy auslösen
        if: steps.rel.outputs.created == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          WEBHOOK_OPTIONAL: ${{ vars.DEPLOY_WEBHOOK_OPTIONAL }}
        run: |
          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            if [ "$WEBHOOK_OPTIONAL" = "true" ]; then
              echo "::notice::Komodo-Webhook übersprungen (DEPLOY_WEBHOOK_OPTIONAL=true, Secrets fehlen)."
              exit 0
            fi
            echo "::error::KOMODO_WEBHOOK_URL/KOMODO_WEBHOOK_SECRET fehlen. Image liegt in GHCR; manueller Redeploy in Komodo möglich."
            exit 1
          fi

          body='{"ref":"refs/heads/main"}'
          signature=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          curl --fail-with-body --show-error --silent \
            --request POST "$WEBHOOK_URL" \
            --header "Content-Type: application/json" \
            --header "X-GitHub-Event: push" \
            --header "X-Hub-Signature-256: sha256=$signature" \
            --data "$body"
          echo "Komodo-Deploy ausgelöst."
