services:
  tabletto:
    build: .
    container_name: tabletto-app
    ports:
      - "3000:3000"
    # Use a named volume for production-stable DB storage. For local dev, you can
    # replace with a bind mount: ./data:/app/data
    volumes:
      - tabletto-data:/app/data
      # - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/tabletto.db
      - ENABLE_STOCK_SCHEDULER=${ENABLE_STOCK_SCHEDULER:-true}
      - STOCK_SCHEDULER_CRON=${STOCK_SCHEDULER_CRON:-*/5 * * * *}
      - UPLOADS_PATH=${UPLOADS_PATH:-/app/data/uploads}
      - TZ=${TZ:-Europe/Berlin}
      - TRUST_PROXY=${TRUST_PROXY:-}
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:3000/health | grep -q '\"status\":\"ok\"'" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  tabletto-data:
    driver: local
